<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contato</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

<nav class="bg-white shadow p-4 flex justify-between">
  <h1 class="text-primary font-bold">StudAI</h1>
</nav>

<section class="px-4 md:px-10 py-10 max-w-3xl mx-auto">
  <h1 class="text-3xl font-bold mb-6">Contato</h1>

  <form class="bg-white p-6 rounded shadow space-y-4">
    <input type="text" placeholder="Nome" class="w-full border p-2 rounded">
    <input type="email" placeholder="Email" class="w-full border p-2 rounded">
    <input type="text" placeholder="Assunto" class="w-full border p-2 rounded">
    <textarea placeholder="Mensagem" class="w-full border p-2 rounded"></textarea>
    <button class="bg-primary text-white px-6 py-2 rounded">Enviar</button>
  </form>
</section>

</body>
</html>
